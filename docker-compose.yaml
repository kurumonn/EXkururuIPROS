services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      IPS_ADMIN_TOKEN: ${IPS_ADMIN_TOKEN:-change-me}
      IPS_DB_PATH: /data/ips_open.db
      IPROS_DEFAULT_WORKSPACE: ${IPROS_DEFAULT_WORKSPACE:-lab}
      IPS_REPLAY_BACKEND: ${IPS_REPLAY_BACKEND:-redis}
      IPS_REDIS_URL: redis://redis:6379/0
      IPS_REPLAY_FALLBACK_TO_MEMORY: ${IPS_REPLAY_FALLBACK_TO_MEMORY:-1}
      IPROS_XDR_BASE_URL: ${IPROS_XDR_BASE_URL:-http://xdr:8810}
      IPROS_SOC_BASE_URL: ${IPROS_SOC_BASE_URL:-http://soc:8820}
      IPROS_EDR_BASE_URL: ${IPROS_EDR_BASE_URL:-http://edr:8821}
      IPS_CORS_ALLOW_ORIGINS: ${IPS_CORS_ALLOW_ORIGINS:-http://127.0.0.1:8787}
    volumes:
      - ./data:/data
      - ./:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - ipros-redis:/data

volumes:
  ipros-redis:
